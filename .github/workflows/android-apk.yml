name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"

      - name: Install gomobile
        run: |
          go get golang.org/x/mobile
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Test Go core
        run: go test ./go/aiboard/...

      # 核心修复：增加 -androidapi 21
      - name: Build Go Android AAR
        run: gomobile bind -target=android -androidapi 21 -o android/app/libs/aiboard.aar ./go/aiboard/mobile

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        run: gradle :android:app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aiboard-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk